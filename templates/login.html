<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="static/css/login.css">
  <link rel="stylesheet" href="static/css/style.css">
  <link rel="stylesheet" href="static/css/profile.css">
  <link rel="shortcut icon" href="/static/img/favicon.png" type="image/x-icon">
</head>
<body>

<header>
  <div class="logo">
    <a href="/">
      <img src="static/img/logo.webp" alt="logo">
    </a>
  </div>
  <div></div>
  <nav>
    <a href="/">Home</a>
    <a href="/login">Login</a>
  </nav>
</header>

<!-- ═══════════════════════════════ AUTH ═══════════════════════════════ -->

<main class="profile-main">
  <section class="profile-section">
    <h2>Login</h2>
    <form id="login-form">
      <div class="group">
        <input id="login-username" type="text" class="input" required>
        <label>Username</label>
      </div>
      <div class="group">
        <input id="login-senha" type="password" class="input" required>
        <label>Senha</label>
      </div>
      <button type="submit" class="profile-submit-btn">Fazer login</button>
    </form>
  </section>
</main>


<!-- ═══════════════════════════════ RESPOSTA ═══════════════════════════════ -->

<div style="display: none;">
    <h2>Resposta</h2>
    <button onclick="output.textContent = ''">Limpar</button>
    <pre id="output"></pre>
</div>

<script src="static/js/api.js"></script>
<script src="static/js/app.js"></script>
<script>
  document.getElementById("login-form").addEventListener("submit", function(event) {
    event.preventDefault();
    fazerLogin();
  });

  if (new URLSearchParams(window.location.search).get("logout") !== null) {
    fazerLogout();
  }
</script>

</body>
</html>
