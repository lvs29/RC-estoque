<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="static/css/style.css">
  <link rel="stylesheet" href="static/css/profile.css">
  <link rel="shortcut icon" href="/static/img/favicon.png" type="image/x-icon">
</head>
<body>
<header>
  <div class="logo">
    <a href="/">
      <img src="static/img/logo.webp" alt="logo">
    </a>
  </div>
  <div></div>
  <nav>
    <a href="/">Home</a>
    <a href="/login">Login</a>
  </nav>
</header>

<main class="profile-main">
  <h1 class="profile-title">Perfil</h1>
  <p class="profile-description">Atualize suas informações pessoais.</p>

  <section class="profile-section">
    <h2>Informações Pessoais</h2>
    <form id="profile-form" class="profile-form">
      <div class="group">
        <input id="profile-nome" type="text" class="input" required>
        <label>Nome</label>
      </div>
      <div class="group">
        <input id="profile-username" type="text" class="input" required>
        <label>Username</label>
      </div>
      <div class="group">
        <input id="profile-senha-atual" type="password" class="input">
        <label>Senha atual (para mudar senha)</label>
      </div>
      <div class="group">
        <input id="profile-senha-nova" type="password" class="input">
        <label>Nova senha (opcional)</label>
      </div>
      <div class="group">
        <input id="profile-senha-confirma" type="password" class="input">
        <label>Confirmar nova senha</label>
      </div>
      <button type="submit" class="profile-submit-btn">Salvar alterações</button>
    </form>
  </section>
</main>

<script src="static/js/api.js"></script>
<script src="static/js/app.js"></script>
</body>
</html>
